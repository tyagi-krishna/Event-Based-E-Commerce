spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/v1/users/**

        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://product-service:8082}
          predicates:
            - Path=/api/v1/products/**

        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://inventory-service:8083}
          predicates:
            - Path=/api/v1/inventory/**

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://order-service:8084}
          predicates:
            - Path=/api/v1/orders/**

        - id: order-service-simulate
          uri: ${ORDER_SERVICE_URL:http://order-service:8084}
          predicates:
            - Path=/api/v1/simulate/duplicate-event

        - id: notification-service-simulate
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8085}
          predicates:
            - Path=/api/v1/simulate/notification/**

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:change-this-user-service-jwt-secret-before-production}
    issuer: ${JWT_ISSUER:user-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info
