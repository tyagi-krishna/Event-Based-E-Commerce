spring.application.name=user-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/user_service}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user_service_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rgbXYZ@9182}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

server.port=8081

security.jwt.secret=${JWT_SECRET:change-this-user-service-jwt-secret-before-production}
security.jwt.issuer=${JWT_ISSUER:user-service}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=outbox-publisher-
